name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish Docker Image

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Belt-and-suspenders: version consistency (tag == package.json == CHANGELOG) is already
      # enforced by release.yaml before the release is created. This guards manual `make release`
      # fallbacks too, where no such check runs.
      - name: Validate tag format
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag '$TAG_NAME' must be vX.Y.Z (semantic versioning, e.g. v1.0.0)"
            exit 1
          fi
          echo "✅ Tag format is valid: $TAG_NAME"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # One image for all deployments. PUBLIC_API_URL and ORIGIN are set at
      # RUNTIME (#396), so they are not build args; demo/prod differ only by the
      # runtime env in their respective compose files. PUBLIC_VERSION (shown in
      # the footer) is known only at release time, so it is passed as a build arg
      # and baked into the image's runtime ENV — read at runtime via
      # $env/dynamic/public (#493), not inlined into the JS bundle.
      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Supply-chain attestations published alongside the image to GHCR.
          sbom: true
          provenance: mode=max
          build-args: |
            PUBLIC_VERSION=${{ github.event.release.tag_name }}
          tags: |
            ghcr.io/letsrevel/revel-frontend:latest
            ghcr.io/letsrevel/revel-frontend:${{ github.event.release.tag_name }}

      # Ops signal: fires only after the image is pullable from GHCR. Failure
      # (Discord down, missing secret) must never fail the publish job.
      - name: Notify Discord
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_FRONTEND_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_FRONTEND_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          curl -sf --max-time 10 -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"📦 \`ghcr.io/letsrevel/revel-frontend:${{ github.event.release.tag_name }}\` is published and ready to deploy — ${{ github.event.release.html_url }}\"}"
