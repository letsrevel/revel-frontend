name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish Docker Image

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Belt-and-suspenders: version consistency (tag == package.json == CHANGELOG) is already
      # enforced by release.yaml before the release is created. This guards manual `make release`
      # fallbacks too, where no such check runs.
      - name: Validate tag format
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag '$TAG_NAME' must be vX.Y.Z (semantic versioning, e.g. v1.0.0)"
            exit 1
          fi
          echo "✅ Tag format is valid: $TAG_NAME"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # One image for all deployments. PUBLIC_API_URL and ORIGIN are set at
      # RUNTIME (#396), so they are not build args; demo/prod differ only by the
      # runtime env in their respective compose files. PUBLIC_VERSION (shown in
      # the footer) is known only at release time, so it is passed as a build arg
      # and baked into the image's runtime ENV — read at runtime via
      # $env/dynamic/public (#493), not inlined into the JS bundle.
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Supply-chain attestations published alongside the image to GHCR.
          sbom: true
          provenance: mode=max
          build-args: |
            PUBLIC_VERSION=${{ github.event.release.tag_name }}
          tags: |
            ghcr.io/letsrevel/revel-frontend:latest
            ghcr.io/letsrevel/revel-frontend:${{ github.event.release.tag_name }}
