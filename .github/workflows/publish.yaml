name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-demo:
    runs-on: ubuntu-latest
    name: Publish Demo Image

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push Demo Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Supply-chain attestations published alongside the image to GHCR.
          sbom: true
          provenance: mode=max
          build-args: |
            PUBLIC_API_URL=https://demo-api.letsrevel.io
            ORIGIN=https://demo.letsrevel.io
            PUBLIC_VERSION=${{ github.event.release.tag_name }}
          tags: |
            ghcr.io/letsrevel/revel-frontend:latest-demo
            ghcr.io/letsrevel/revel-frontend:${{ github.event.release.tag_name }}-demo

  publish-prod:
    runs-on: ubuntu-latest
    name: Publish Production Image

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push Production Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Supply-chain attestations published alongside the image to GHCR.
          sbom: true
          provenance: mode=max
          build-args: |
            PUBLIC_API_URL=https://api.letsrevel.io
            ORIGIN=https://letsrevel.io
            PUBLIC_VERSION=${{ github.event.release.tag_name }}
          tags: |
            ghcr.io/letsrevel/revel-frontend:latest
            ghcr.io/letsrevel/revel-frontend:${{ github.event.release.tag_name }}
