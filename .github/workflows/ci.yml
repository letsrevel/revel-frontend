name: CI

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

# Least-privilege default for every job in this workflow (it only reads the repo).
permissions:
  contents: read

jobs:
  # Lint and type check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier
        run: pnpm prettier --check .

      - name: Run ESLint
        run: pnpm lint

      - name: Run SvelteKit type check
        run: pnpm check
        continue-on-error: true

  # Test translations
  i18n:
    name: Translation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Validate translations
        run: node scripts/validate-translations.js

      - name: Guard against new hardcoded (untranslated) strings
        run: node scripts/check-i18n-hardcoded.mjs

      - name: Check translation file formatting
        run: |
          for file in messages/*.json; do
            echo "Checking $file..."
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf-8'))" || exit 1
          done

  # Build check
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [i18n]
    if: always()
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile translations
        run: pnpm paraglide:compile

      - name: Read version from package.json
        run: echo "VERSION=$(jq -r '.version' package.json)" >> "$GITHUB_ENV"

      - name: Build application
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          PUBLIC_API_URL: http://localhost:8000
          PUBLIC_VERSION: ${{ env.VERSION }}

      - name: Check build artifacts
        run: |
          if [ ! -d "build" ]; then
            echo "Build directory not found!"
            exit 1
          fi
          echo "Build successful! Artifacts:"
          ls -lah build/ | head -20
