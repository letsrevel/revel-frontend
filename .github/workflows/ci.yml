name: CI

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

# Least-privilege default for every job in this workflow (it only reads the repo).
permissions:
  contents: read

jobs:
  # Lint and type check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier
        run: pnpm prettier --check .

      - name: Run ESLint
        run: pnpm lint

      # svelte-check resolves $lib/paraglide/messages, which is gitignored and
      # generated — compile it first or every message reference is a type error.
      - name: Compile translations
        run: pnpm paraglide:compile

      - name: Run SvelteKit type check
        run: pnpm check

      # The three make-check gates below previously ran only locally — anything
      # committed without `make check` (web edits, external PRs) escaped them.
      - name: Check file lengths
        run: ./scripts/check-file-length.sh

      - name: Guard against SSR access-token leaks
        run: ./scripts/check-no-ssr-token.sh

      - name: Audit image alt text
        run: pnpm audit:images

  # Unit tests (vitest)
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tests render components that import $lib/paraglide/messages (gitignored,
      # generated) — compile first, same as the lint job.
      - name: Compile translations
        run: pnpm paraglide:compile

      - name: Run unit tests
        run: pnpm test

  # Backend-free regression e2e specs (CSP + dark-mode-FOUC guards), full
  # 5-browser matrix. Not the release-gate e2e suite (see e2e.yml) — these
  # only need the built frontend, no backend stack.
  regression-e2e:
    name: Regression E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tests render components that import $lib/paraglide/messages (gitignored,
      # generated) — compile first, same as the lint job.
      - name: Compile translations
        run: pnpm paraglide:compile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      # CSP + dark-mode-FOUC guards on the 5-browser matrix. No backend:
      # regression specs only need the built frontend (tests/e2e/README.md).
      - name: Run regression specs
        run: pnpm exec playwright test tests/e2e/regression

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: regression-e2e-report
          path: playwright-report/
          retention-days: 7

  # Test translations
  i18n:
    name: Translation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Validate translations
        run: node scripts/validate-translations.js

      - name: Guard against new hardcoded (untranslated) strings
        run: node scripts/check-i18n-hardcoded.mjs

      - name: Check translation file formatting
        run: |
          for file in messages/*.json; do
            echo "Checking $file..."
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf-8'))" || exit 1
          done

  # Build check
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [i18n]
    if: always()
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile translations
        run: pnpm paraglide:compile

      - name: Read version from package.json
        run: echo "VERSION=$(jq -r '.version' package.json)" >> "$GITHUB_ENV"

      - name: Build application
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          PUBLIC_API_URL: http://localhost:8000
          PUBLIC_VERSION: ${{ env.VERSION }}

      - name: Check build artifacts
        run: |
          if [ ! -d "build" ]; then
            echo "Build directory not found!"
            exit 1
          fi
          echo "Build successful! Artifacts:"
          ls -lah build/ | head -20
