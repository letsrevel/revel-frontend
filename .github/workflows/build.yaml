name: Build

# CI already builds the app natively on every push; this workflow only needs to
# validate the Docker image itself, so it runs when Docker-related files change.
# It also scans the built image with Trivy and reports findings to the Security tab.
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'patches/**'

permissions:
  contents: read
  # Lets Trivy upload its SARIF report to the code-scanning / Security tab.
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Read version from package.json
        id: get_version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          # Load into the local Docker daemon so the scan step can read it.
          load: true
          build-args: |
            PUBLIC_API_URL=https://demo-api.letsrevel.io
            ORIGIN=https://demo.letsrevel.io
            PUBLIC_VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/letsrevel/revel-frontend:latest
            ghcr.io/letsrevel/revel-frontend:${{ env.VERSION }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/letsrevel/revel-frontend:${{ env.VERSION }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # Report-only: base-image OS CVEs are often unfixable, so don't fail the
          # build — surface findings in the Security tab instead. Flip to '1' to gate.
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
