name: Build

# CI already builds the app natively on every push; this workflow only needs to
# validate the Docker image itself, so it runs when Docker-related files change.
# It also scans the built image with Trivy and reports findings to the Security tab.
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'patches/**'

permissions:
  contents: read
  # Lets Trivy upload its SARIF report to the code-scanning / Security tab.
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read version from package.json
        id: get_version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          # Load into the local Docker daemon so the scan step can read it.
          load: true
          # PUBLIC_API_URL and ORIGIN are set at RUNTIME (see #396), not baked at
          # build time. PUBLIC_VERSION is passed as a build arg and baked into the
          # image's runtime ENV, read via $env/dynamic/public at runtime (#493).
          build-args: |
            PUBLIC_VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/letsrevel/revel-frontend:latest
            ghcr.io/letsrevel/revel-frontend:${{ env.VERSION }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ghcr.io/letsrevel/revel-frontend:${{ env.VERSION }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # Report-only: base-image OS CVEs are often unfixable, so don't fail the
          # build — surface findings in the Security tab instead. Flip to '1' to gate.
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
