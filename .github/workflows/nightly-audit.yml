name: Nightly dependency audit

# Runs pnpm audit and the license check against main every night so newly-disclosed
# CVEs (or licenses of existing deps being reclassified) surface within ~24h even when
# no PR is open. The PR workflow (deps.yml) already catches issues on every push; this
# job complements it by closing the gap between PRs.
#
# On failure each job opens (or bumps) a GitHub issue tagged `security` + `dependencies`
# so the advisory lands in the tracker without relying on someone staring at the
# Actions tab.
#
# Frontend mirror of revel-backend/.github/workflows/nightly-audit.yml.

on:
  schedule:
    # 03:23 UTC every day — off the top of the hour, and offset from the backend's
    # 03:17 job so the two repos don't audit at the exact same minute.
    - cron: '23 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: pnpm audit (main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: make audit

      - name: Open tracker issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = `Nightly pnpm-audit failure (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              "The nightly dependency audit on `main` failed.",
              "",
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Triage: run `make audit` locally. Bump the offending dependency (or add a",
              "scoped `pnpm.overrides` entry); if the advisory is not applicable, add its",
              "GHSA id to `pnpm.auditConfig.ignoreGhsas` in package.json with a reason.",
            ].join("\n");
            // Dedupe: if an open issue already carries the same title slug, bump it
            // with a comment instead of filing a fresh one each night.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "security,dependencies",
              per_page: 50,
            });
            const match = existing.data.find((i) =>
              i.title.startsWith("Nightly pnpm-audit failure")
            );
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Another failing run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["security", "dependencies"],
              });
            }

  licensecheck:
    name: License compliance (main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run license check
        run: make licensecheck

      - name: Open tracker issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = `Nightly license-check failure (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              "The nightly license compliance check on `main` failed.",
              "",
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Triage: run `make licensecheck` locally to see the offending package(s).",
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "security,dependencies",
              per_page: 50,
            });
            const match = existing.data.find((i) =>
              i.title.startsWith("Nightly license-check failure")
            );
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Another failing run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["security", "dependencies"],
              });
            }
