name: Security

# Secret scanning with gitleaks. Run as a checksum-pinned binary rather than the
# marketplace action because this repo is org-owned (the action requires a
# GITLEAKS_LICENSE for organisations); the binary has no such requirement.

on:
  workflow_dispatch: {}
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  # Lets gitleaks upload its SARIF report to the Security tab.
  security-events: write

env:
  GITLEAKS_VERSION: 8.30.1
  GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "$asset" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${asset}"
          echo "${GITLEAKS_SHA256}  ${asset}" | sha256sum -c -
          tar -xzf "$asset" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree for secrets
        run: |
          gitleaks dir . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1

      - name: Upload gitleaks results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
