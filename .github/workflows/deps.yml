name: Dependency checks

# Runs on every PR and push to main that touches the dependency graph:
#   - audit:        fails on known CVEs in shipped (production) deps at high severity+
#   - licensecheck: fails on copyleft / source-available licenses entering the tree
# The nightly workflow (nightly-audit.yml) re-runs both against main so newly-disclosed
# advisories surface within ~24h even without a PR.
#
# Frontend mirror of revel-backend/.github/workflows/deps.yaml.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - Makefile
      - scripts/check-licenses.mjs
      - .github/workflows/deps.yml
  pull_request:
    paths:
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - Makefile
      - scripts/check-licenses.mjs
      - .github/workflows/deps.yml

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit (prod, high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        # --frozen-lockfile audits the committed graph, never a runtime re-resolve.
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: make audit

  licensecheck:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run license check
        run: make licensecheck
