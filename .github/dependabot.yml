version: 2
updates:
  # JavaScript dependencies (pnpm). Grouped to keep PR noise low; a cooldown mirrors
  # the pnpm `minimumReleaseAge` quarantine so Dependabot doesn't propose a version
  # younger than our supply-chain hold-down window.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
    groups:
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # @types/node must track the runtime Node major (22 — see `engines`,
      # Dockerfile, CI), not the latest release; newer majors let code compile
      # against APIs that don't exist at runtime. Bump manually with Node itself.
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions — keeps the commit-SHA pins current (Dependabot updates the SHA
  # and the trailing `# vN` comment together), so pinning never means going stale.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
