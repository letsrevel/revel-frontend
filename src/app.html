<!doctype html>
<html lang="%paraglide.lang%" dir="%paraglide.textDirection%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/logo.svg" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#8C3CDD" />
		<link rel="manifest" href="/manifest.json" />
		<!-- RSS Feed for events -->
		<link rel="alternate" type="application/rss+xml" title="Revel Events Feed" href="/feed.xml" />
		<!-- OpenSearch for browser search integration -->
		<link
			rel="search"
			type="application/opensearchdescription+xml"
			title="Revel"
			href="/opensearch.xml"
		/>
		<!--
			Open Graph / Twitter image tags are emitted per-page by SeoHead.svelte
			(src/lib/seo) so each event/org share carries its own cover. They used
			to be hardcoded here too, which double-emitted og:image and made
			unfurlers pick the generic card over the specific one. SeoHead's
			buildSeo() falls back to /og-image.png for all non-event/org pages.
		-->
		<!--
			Anti-FOUC: apply the dark class before first paint so dark-mode users
			never see a light flash on SSR loads (#440). mode-watcher injects an
			equivalent <svelte:head> snippet, but it carries no nonce and is blocked
			by our production CSP (script-src 'self'); this script is nonced via
			%sveltekit.nonce% so it runs. Must stay synchronous (no defer/async) and
			mirror mode-watcher's storage key ('mode-watcher-mode') and dark class.
		-->
		<script nonce="%sveltekit.nonce%">
			(() => {
				try {
					const mode = localStorage.getItem('mode-watcher-mode') || 'system';
					const dark =
						mode === 'dark' ||
						(mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					const root = document.documentElement;
					root.classList.toggle('dark', dark);
					root.style.colorScheme = dark ? 'dark' : 'light';
				} catch {
					/* localStorage unavailable (e.g. private mode) — fall back to light */
				}
			})();
		</script>
		<!--
			Anti-FOUC for the brand experiment: apply the data-brand attribute
			before first paint so A/B testers don't see a Legacy flash on SSR
			loads. Nonced (script-src 'self'). Must stay synchronous. Mirrors the
			store's storage key ('revel-brand') and attribute ('data-brand').
		-->
		<script nonce="%sveltekit.nonce%">
			(() => {
				try {
					const brand = localStorage.getItem('revel-brand');
					// Keep in sync with BRAND_THEMES in brandTheme.svelte.ts.
					if (['gradient', 'midnight', 'crimson', 'mono'].indexOf(brand) !== -1) {
						document.documentElement.dataset.brand = brand;
					}
				} catch {
					/* localStorage unavailable — fall back to Legacy */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
